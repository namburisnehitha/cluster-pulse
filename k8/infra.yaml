## MySQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: cluster-pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: rootpass
            - name: MYSQL_DATABASE
              value: cluster_pulse
            - name: MYSQL_USER
              value: user
            - name: MYSQL_PASSWORD
              value: password
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: cluster-pulse
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
---
## Redis
apiVersion: apps/v1
